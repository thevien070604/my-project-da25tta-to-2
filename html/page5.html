<!DOCTYPE html>
<html lang = "vi">
	<head> 
		<title>Nhập dữ liệu với prompt() và hiện thị với alert()</title> 
		<meta charset = "utf-8">
	</head> 
	<body>
		
	    <script>
		    let name = prompt("Hãy nhập vào tên của bạn");
		    let yob = Number(prompt("Hãy nhập năm sinh của bạn"));//Chuyển về trị số với Number
		
		    window.alert ("Xin chào " + name + ", năm 2026 bạn đã " +(2026-yob) + " tuổi rồi đó.");
	    </script>
	</body>
</html>
