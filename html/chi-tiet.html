<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Chi tiết xe SH</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/style06.css">

    <script src="../js/lib.js"></script>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="row">

            <div class="col-md-5 text-center">
                <img src="" alt="" id="image" class="img-fluid">
            </div>

            <div class="col-md-7">

                <h2 id="name" class="text-danger"></h2>

                <h3 id="price" class="text-primary mt-3"></h3>

                <p id="description" class="mt-3"></p>

                <button class="btn btn-danger">
                    Mua ngay
                </button>

                <a href="index.html" class="btn btn-outline-secondary">
                    Quay lại
                </a>

            </div>

        </div>

    </div>

</div>

<script>

    const urlParams = new URLSearchParams(window.location.search);

    const productId = urlParams.get('masp');

    const foundProduct = products.find(
        obj => obj.id === productId
    );

    if(foundProduct)
    {
        document.getElementById("name").innerText =
            foundProduct.name;

        document.getElementById("price").innerText =
            foundProduct.price.toLocaleString('vi-VN') + " đ";

        document.getElementById("description").innerText =
            foundProduct.description;

        document.getElementById("image").src =
            foundProduct.image;

        document.getElementById("image").alt =
            foundProduct.name;
    }
    else
    {
        document.getElementById("container").innerHTML =
        `
            <div class="alert alert-danger">
                Không tìm thấy sản phẩm!
            </div>
        `;
    }

</script>

</body>
</html>
