<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Đơn xin gia nhập đội</title>
	<link rel = "stylesheet" href = "../css/style03.css">
</head>
<body>
    <div class="container">
        <form id="frmJoinTeam">

            <h2>ĐƠN XIN GIA NHẬP ĐỘI</h2>

            <div class="form-group">
                <label for="txtName">Họ và tên:</label>
                <input class="form-control" type="text" id="txtName" name="txtName" 
                       value="Từ Thế Viễn">
            </div>

            <div class="form-group">
                <label for="txtClass">Lớp:</label>
                <input class="form-control" type="text" id="txtClass" name="txtClass" 
                       value="DA25TTA">
            </div>

            <div class="form-group">
                <label for="txtEmail">Email:</label>
                <input class="form-control" type="email" id="txtEmail" name="txtEmail" 
                       value="thevien.070604@gmail.com">
            </div>

            <div class="form-group">
                <label for="txtReason">Lý do muốn gia nhập đội:</label>
                <textarea class="form-control" id="txtReason" name="txtReason" rows="5">
Em muốn tham gia đội để học hỏi thêm kinh nghiệm, rèn luyện kỹ năng và đóng góp cho tập thể.
                </textarea>
            </div>

            <div class="form-group">
                <label for="txtSkill">Kỹ năng / Sở trường:</label>
                <textarea class="form-control" id="txtSkill" name="txtSkill" rows="4">
Giao tiếp tốt, biết sử dụng tin học văn phòng và có tinh thần làm việc nhóm.
                </textarea>
            </div>

            <input class="button" type="submit" value="Gửi đơn">
            <input class="button" type="reset" value="Làm lại">

        </form>
    </div>
</body>
</html>
