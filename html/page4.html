<! DOCTYPE html>
<html lang = "vi">
    <head> 
        <title>Hiển thị thông báo với alert ()</title> 
		<meta charset = "utf-8">
    </head>
	<body>
        <p id = "name">Thế Viễn</p>
		<script>
            const obj = document.getElementById("name") ;
            window.alert("Xin chào " + obj.innerHTML + "! Hôm nay bạn thế nào?") ;
        </script>
    </body>
</html>
